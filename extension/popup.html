<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fontify Inspector</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 300px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #0a0a0a;
        color: #fafafa;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid #262626;
      }
      .logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: #171717;
        border: 1px solid #262626;
        font-weight: 700;
        font-size: 14px;
      }
      .title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .body {
        padding: 16px;
      }
      button#inspect {
        width: 100%;
        padding: 10px 14px;
        border: none;
        border-radius: 10px;
        background: #fafafa;
        color: #0a0a0a;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      button#inspect:hover {
        background: #d4d4d4;
      }
      button#inspect.active {
        background: #16a34a;
        color: #fff;
      }
      .hint {
        margin: 10px 0 0;
        font-size: 11px;
        line-height: 1.5;
        color: #737373;
      }
      .results {
        margin-top: 16px;
        border-top: 1px solid #262626;
        padding-top: 14px;
      }
      .empty {
        font-size: 12px;
        color: #525252;
        text-align: center;
        padding: 12px 0;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      li {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #737373;
        flex-shrink: 0;
      }
      .value {
        font-size: 12px;
        font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
        color: #fafafa;
        text-align: right;
        word-break: break-word;
      }
      .swatch {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 3px;
        border: 1px solid #404040;
        vertical-align: middle;
        margin-right: 6px;
      }
      .color-value {
        display: inline-flex;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">F</div>
      <div class="title">Fontify Inspector</div>
    </div>

    <div class="body">
      <button id="inspect">Inspect Font</button>
      <p class="hint" id="hint">
        Click to start, then hover any element. A tooltip appears on the page;
        the last reading is also saved here.
      </p>

      <div class="results">
        <div class="empty" id="empty">No element inspected yet.</div>
        <ul id="details" hidden>
          <li>
            <span class="label">Font Family</span>
            <span class="value" id="fontFamily">—</span>
          </li>
          <li>
            <span class="label">Font Size</span>
            <span class="value" id="fontSize">—</span>
          </li>
          <li>
            <span class="label">Font Weight</span>
            <span class="value" id="fontWeight">—</span>
          </li>
          <li>
            <span class="label">Color</span>
            <span class="value color-value" id="color">—</span>
          </li>
        </ul>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
